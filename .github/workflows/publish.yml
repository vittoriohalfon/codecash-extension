name: Publish extension

# Publishes the extension to the VS Code Marketplace — and to Open VSX too, but only if an
# OVSX_PAT secret is set — whenever a version tag (v*) is pushed.
#
# Release flow:
#   1. Make extension changes in the monorepo (adcash/apps/extension), bump "version" in its
#      package.json, then run scripts/sync-client-repo.sh to regenerate this mirror.
#   2. Commit + push the mirror, then tag and push:  git tag v0.1.2 && git push origin v0.1.2
#   3. This workflow rebuilds the .vsix (prod URL baked in), gate-checks it, and publishes.
#
# Required repo secret: VSCE_PAT (Azure DevOps PAT, scope Marketplace > Manage).
# Optional repo secret: OVSX_PAT (open-vsx.org token) — when present, also publishes to Open VSX.
# Set them with:  gh secret set VSCE_PAT -R vittoriohalfon/codecash-extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow a manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # The published build must point at the live server, not localhost (baked at build time
      # via esbuild define — see esbuild.mjs).
      CODECASH_DEFAULT_API_BASE_URL: https://www.codecash.dev
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # A tag must match the manifest version, or the Marketplace would reject the upload anyway.
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: pnpm typecheck
      # renderPipeline.test.ts exec's the bundled dist/render.mjs, so the bundle must exist before
      # tests run (dist/ is gitignored — absent on a fresh checkout). Build first, like the monorepo CI.
      - run: pnpm build
      - run: pnpm test
      - name: Package .vsix (prod URL baked in)
        run: pnpm run package

      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish --packagePath codecash.vsix

      # Skipped unless OVSX_PAT is configured (ovsx reads it from the env).
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: pnpm exec ovsx publish codecash.vsix
